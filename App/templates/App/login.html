{% extends 'App/base.html' %}
{% load static %}

{% block title %}Вход — Водить.РФ{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-md p-6 sm:p-8">
        <h1 class="text-2xl font-bold text-sea-blue text-center mb-6">Вход в систему</h1>

        {% if form.errors %}
            <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">
                Неверный логин или пароль. Пожалуйста, попробуйте снова.
            </div>
        {% endif %}

        <form method="post" novalidate class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
                <input type="text" name="username" id="{{ form.username.id_for_label }}"
                       class="form-input" placeholder="Введите логин" required>
            </div>

            <div>
                <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" name="password" id="{{ form.password.id_for_label }}"
                       class="form-input" placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="w-full bg-sea-blue text-white py-3 rounded-lg font-medium text-base hover:bg-blue-600 transition shadow-md">
                Войти
            </button>
        </form>

        <p class="text-center text-sm text-metal-gray mt-5">
            Еще не зарегистрированы?
            <a href="{% url 'register' %}" class="text-sea-blue font-medium hover:underline">Регистрация</a>
        </p>
    </div>
</div>
{% endblock %}
